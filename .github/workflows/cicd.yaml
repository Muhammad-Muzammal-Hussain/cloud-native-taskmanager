name: CI/CD - Build and Push Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/taskapi:latest
            ${{ secrets.DOCKER_USERNAME }}/taskapi:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./app/web
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/taskweb:latest
            ${{ secrets.DOCKER_USERNAME }}/taskweb:${{ github.sha }}

      - name: Summary
        run: |
          echo "✅ Images pushed successfully!"
          echo "API:  ${{ secrets.DOCKER_USERNAME }}/taskapi:${{ github.sha }}"
          echo "Web:  ${{ secrets.DOCKER_USERNAME }}/taskweb:${{ github.sha }}"
