apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: taskapp
  labels: { app: api }
spec:
  replicas: 2                      # 2 replicas -> demonstrates scaling & rolling updates
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          # ${ACR_LOGIN_SERVER} and ${IMAGE_TAG} are substituted at deploy time (envsubst / CI)
          image: ${ACR_LOGIN_SERVER}/taskapi:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: app-config }
          env:
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: postgres-secret, key: POSTGRES_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-secret, key: POSTGRES_PASSWORD } }
          readinessProbe:
            httpGet: { path: /api/readyz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/healthz, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "192Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: taskapp
spec:
  selector: { app: api }
  ports:
    - port: 3000
      targetPort: 3000
