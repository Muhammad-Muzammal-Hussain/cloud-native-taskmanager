# Database credentials. In production these would come from Azure Key Vault
# (via the Secrets Store CSI driver). For the lab we use a native K8s Secret.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: taskapp
type: Opaque
stringData:
  POSTGRES_DB: tasks
  POSTGRES_USER: taskuser
  POSTGRES_PASSWORD: "ChangeMe_Str0ng!"   # change before submitting
